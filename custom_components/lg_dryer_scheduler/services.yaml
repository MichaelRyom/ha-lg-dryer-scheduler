delay_end:
  name: Delay end
  description: >
    Tell the dryer to be done in N hours. The dryer computes its own start time
    based on the selected program length and counts down on its own clock —
    no WiFi needed during the wait. Only available on dryers whose profile
    exposes relativeHourToStop as writable.
  fields:
    entity_id:
      name: Target entity
      description: Any entity from the target dryer (only needed if multiple dryers configured)
      example: sensor.torretumbler_run_state
      selector:
        text:
    hours:
      name: Hours until program ends
      description: How many hours from now the program should be done. Range depends on the dryer (typically 3-19).
      required: true
      example: 8
      selector:
        number:
          min: 0
          max: 24
          mode: box
          unit_of_measurement: hours
    minutes:
      name: Minutes until program ends
      description: Additional minutes (only effective if the dryer's profile says relativeMinuteToStop is writable; otherwise ignored).
      default: 0
      selector:
        number:
          min: 0
          max: 59
          mode: box
          unit_of_measurement: minutes

delay_start:
  name: Delay start
  description: >
    Tell the dryer to start in N hours. Only available on dryers whose profile
    exposes relativeHourToStart as writable. If your dryer only exposes delay-end,
    use the delay_end service instead.
  fields:
    entity_id:
      name: Target entity
      description: Any entity from the target dryer (only needed if multiple dryers configured)
      example: sensor.torretumbler_run_state
      selector:
        text:
    hours:
      name: Hours until start
      description: How many hours from now the program should start.
      required: true
      example: 5
      selector:
        number:
          min: 0
          max: 24
          mode: box
          unit_of_measurement: hours
    minutes:
      name: Minutes until start
      default: 0
      selector:
        number:
          min: 0
          max: 59
          mode: box
          unit_of_measurement: minutes

refresh:
  name: Refresh
  description: Force the integration to poll the dryer immediately.
  fields:
    entity_id:
      name: Target entity
      description: Any entity from the target dryer (only needed if multiple dryers configured)
      selector:
        text:

get_energy_usage:
  name: Get energy usage
  description: >
    Fetch energy usage from the LG ThinQ Connect API for a given date range.
    Returns response data; use response_variable in your script/automation.
  fields:
    entity_id:
      name: Target entity
      selector:
        text:
    start_date:
      name: Start date
      description: ISO date YYYY-MM-DD
      required: true
      example: "2026-04-01"
      selector:
        text:
    end_date:
      name: End date
      description: ISO date YYYY-MM-DD
      required: true
      example: "2026-04-29"
      selector:
        text:
    period:
      name: Period
      description: Aggregation level
      default: DAY
      selector:
        select:
          options:
            - DAY
            - MONTH
            - YEAR
    energy_property:
      name: Energy property
      description: Property name (defaults to totalEnergy)
      default: totalEnergy
      selector:
        text:
